<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeafyLife | AI Digital Garden</title>
    <style>
        :root {
            --light-sage: #f1f8e9;
            --dark-forest: #1b5e20;
            --leaf-green: #4caf50;
            --white: #ffffff;
            --gray: #f9f9f9;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.5s; }
        .theme-light { background-color: var(--light-sage); color: var(--dark-forest); }
        .theme-dark { background-color: var(--dark-forest); color: var(--light-sage); }

        .page { display: none; width: 100%; min-height: 100vh; flex-direction: column; align-items: center; }
        .page.active { display: flex; }

        .hero-container { width: 100%; height: 90vh; position: relative; overflow: hidden; }
        .main-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; bottom: 10%; width: 100%; text-align: center; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); padding: 30px 0; }
        .round-btn { border-radius: 50px; padding: 15px 50px; border: none; background: var(--leaf-green); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        #page-2 { justify-content: center; }
        .centered-form { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); }
        
        .dashboard-card { background: var(--white); color: #333; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; margin: 40px 0; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .weather-box { display: flex; align-items: center; gap: 15px; background: var(--gray); padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #eee; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        button.action-btn { background: var(--dark-forest); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px; }
        button.action-btn:disabled { background: #ccc; cursor: not-allowed; }

        #query-result { 
            margin-top: 20px; padding: 15px; border-left: 4px solid var(--leaf-green); 
            background: #f1f8e9; border-radius: 0 8px 8px 0; display: none; font-size: 0.95rem; line-height: 1.4;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { font-weight: bold; color: var(--dark-forest); display: block; margin-bottom: 5px; font-size: 0.9rem; }
    </style>
</head>
<body class="theme-light">

    <!-- PAGE 1: HERO (Image Kept Here) -->
    <section id="page-1" class="page active">
        <div class="hero-container">
            <img src="https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?q=80&w=1000" class="main-img">
            <div class="hero-overlay">
                <h2>"To plant a garden is to believe in tomorrow."</h2>
                <button class="round-btn" onclick="nav(2)">Start My Journey</button>
            </div>
        </div>
    </section>

    <!-- PAGE 2: LOCATION -->
    <section id="page-2" class="page">
        <div class="centered-form">
            <h2 style="color: white; margin-bottom: 15px;">Your Location</h2>
            <input type="text" id="country" placeholder="Country (e.g. India)">
            <input type="text" id="state" placeholder="State (e.g. Gujarat)">
            <input type="text" id="city" placeholder="City (e.g. Surat)">
            <button id="entry-btn" class="action-btn" style="background: var(--leaf-green);" onclick="processLocation()">Enter Dashboard</button>
        </div>
    </section>

    <!-- PAGE 3: DASHBOARD (Photo Upload Removed) -->
    <section id="page-3" class="page">
        <div class="dashboard-card">
            <header>
                <h2 id="display-city" style="margin: 0; color: var(--dark-forest);">My Garden</h2>
                <p id="full-location" style="margin: 5px 0; font-size: 0.85rem; color: #666;"></p>
                
                <div class="weather-box">
                    <span style="font-size: 2.2rem;">🌡️</span>
                    <div>
                        <p style="margin: 0; font-size: 0.9rem; color: #666;">Real-Time Temperature</p>
                        <p style="margin: 0; font-size: 1.2rem;"><strong><span id="temp-val">--</span>°C</strong></p>
                    </div>
                </div>
                <p id="advice" style="font-style: italic; color: #2e7d32; font-size: 0.9rem; margin-top: 10px;"></p>
            </header>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <div class="form-group">
                <label>🤖 Ask AI Botanist</label>
                <textarea id="query-input" rows="3" placeholder="Ask a gardening question..."></textarea>
                <button id="submit-btn" class="action-btn" onclick="handleAIQuery()">Get AI Advice</button>
            </div>
            
            <div id="query-result"></div>
        </div>
        <button onclick="nav(1)" style="background: none; border: none; color: white; text-decoration: underline; cursor: pointer; margin-bottom: 20px;">← Back to Home</button>
    </section>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // Integrated API Keys
        const API_KEY = "AIzaSyASQWT7DLv7gB-Esgax5YF_IJZwzhZyPaE"; 
        const WEATHER_KEY = "92d5ff2227f8b25def7a7c26a3717cee"; 

        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview"},{ apiVersion: 'v1beta' });

        let userLoc = { country: '', state: '', city: '' };

        window.nav = (pageNum) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageNum}`).classList.add('active');
            document.body.className = (pageNum > 1) ? 'theme-dark' : 'theme-light';
        };

        window.processLocation = async () => {
            userLoc.country = document.getElementById('country').value;
            userLoc.state = document.getElementById('state').value;
            userLoc.city = document.getElementById('city').value;
            const entryBtn = document.getElementById('entry-btn');

            if (!userLoc.city) return alert("Please enter at least a City!");

            entryBtn.innerText = "Fetching Weather...";
            entryBtn.disabled = true;

            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${userLoc.city}&units=metric&appid=${WEATHER_KEY}`);
                const data = await response.json();

                if (data.cod !== 200) throw new Error(data.message);

                document.getElementById('temp-val').innerText = Math.round(data.main.temp);
                document.getElementById('display-city').innerText = userLoc.city + "'s Garden";
                document.getElementById('full-location').innerText = `${userLoc.city}, ${userLoc.state}, ${userLoc.country}`;
                
                let quickTip = data.main.temp > 28 ? "It's warm! Ensure your plants are hydrated." : "Temperature is stable for growth.";
                document.getElementById('advice').innerText = "Expert Tip: " + quickTip;

                nav(3);
            } catch (err) {
                alert("Weather Error: " + err.message);
            } finally {
                entryBtn.innerText = "Enter Dashboard";
                entryBtn.disabled = false;
            }
        };

        window.handleAIQuery = async () => {
            const input = document.getElementById('query-input');
            const resultDiv = document.getElementById('query-result');
            const btn = document.getElementById('submit-btn');

            if (!input.value) return alert("Please type a question!");

            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<i>AI is analyzing your local climate...</i>`;
            btn.disabled = true;

            try {
                const temp = document.getElementById('temp-val').innerText;
                const prompt = `I am in ${userLoc.city}, ${userLoc.country}. The current temperature is ${temp}°C. ${input.value}`;
                
                const result = await model.generateContent(prompt);
                const response = await result.response;
                resultDiv.innerHTML = `<strong>Expert Botanist:</strong><br>${response.text()}`;
            } catch (err) {
                resultDiv.innerHTML = `<span style="color:red">AI Error: Please verify your AI Key is still active.</span>`;
            } finally {
                btn.disabled = false;
                input.value = "";
            }
        };
    </script>
</body>
</html>
